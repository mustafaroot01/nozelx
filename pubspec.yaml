name: auto_lube
description: "Premium Auto Care E-Commerce App - Oil, Filters & Car Care Products"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.0

  # Networking
  dio: ^5.8.0+1
  http: ^1.2.2

  # Supabase ✅ NEW
  supabase_flutter: ^2.8.1
  flutter_dotenv: ^6.0.0

  # Local Storage
  shared_preferences: ^2.5.4
  hive: ^2.2.3

  # JSON & Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI Utilities
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  flutter_rating_stars: ^1.0.3+4
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utilities
  dartz: ^0.10.1
  equatable: ^2.0.5
  uuid: ^4.5.1
  provider: ^6.1.5+1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  firebase_messaging: ^16.1.2
  firebase_core: ^4.5.0
  url_launcher: ^6.3.2
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.2
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.3

flutter:
  uses-material-design: true

  # Google Fonts are loaded automatically via google_fonts package
  # No need to manually add font assets

  assets:
    - assets/images/
    - assets/icons/
    - IMG/
    - assets/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "appnozzlelogo.png"
  image_path_ios: "appnozzlelogo.png"
  remove_alpha_ios: true
